# ──────────────────────────────────────────────────────────────────────────────
# RMS Nginx config — frontend-v2 (current) + frontend (legacy) + Spring Boot.
#
# Drop into /etc/nginx/sites-available/rms.conf, symlink into sites-enabled,
# `sudo nginx -t && sudo systemctl reload nginx`.
#
# Layout:
#   /var/www/rms/current        → symlink to latest releases/<timestamp>/   (v2)
#   /var/www/rms/previous       → symlink to the release before that        (v2)
#   /var/www/rms/legacy/build   → CRA `frontend/` build (kept for 30-day soak)
#
# Phase 7 traffic ramp:
#   • Day 0       — both URLs available. /v2/* serves new bundle, /* serves
#                   legacy. Internal QA and beta tenants use /v2/.
#   • Cutover     — flip `location /` from legacy to v2 (this file). Old UI
#                   moves to /legacy/* for the 30-day soak window.
#   • Soak        — uncomment the `?ui=legacy` redirect helper below so
#                   support can tell a customer "type ?ui=legacy" if anything
#                   regresses.
#   • Sunset      — after the soak window, comment out the /legacy/ block and
#                   remove the directory.
# ──────────────────────────────────────────────────────────────────────────────

# Upstream Spring Boot (context-path: /rms).
upstream rms_backend {
    server 127.0.0.1:8091;
    keepalive 32;
}

# HTTP → HTTPS redirect (production).
server {
    listen 80;
    listen [::]:80;
    server_name rms.example.com;
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rms.example.com;

    # ── TLS ────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/rms.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rms.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers (UI-F-63) ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    # CSP intentionally lenient enough to allow Stripe + PayPal + Firebase +
    # Sentry + Unsplash CDN. Tighten per-route if/when those go away.
    add_header Content-Security-Policy "default-src 'self'; \
        script-src 'self' 'unsafe-inline' https://js.stripe.com https://www.paypal.com https://www.gstatic.com https://*.sentry.io; \
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
        font-src 'self' https://fonts.gstatic.com data:; \
        img-src 'self' https: data: blob:; \
        connect-src 'self' https://*.supabase.co https://*.sentry.io https://api.stripe.com https://api.paypal.com wss:; \
        frame-src https://js.stripe.com https://www.paypal.com; \
        object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/wasm image/svg+xml font/woff font/woff2;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Spring Boot (REST + uploads) ───────────────────────────────────────
    # The backend already serves under /rms/. Keep that path namespace so
    # frontend axios calls match the dev environment without rewrites.
    location /rms/ {
        proxy_pass http://rms_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        client_max_body_size 25M;  # menu item / slider image uploads
    }

    # ── Customer SPA + assets (v2 — current) ───────────────────────────────
    root /var/www/rms/current;
    index index.html;

    # Long-cache hashed bundle assets — they're content-hashed so safe forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service worker MUST NOT be cached — workbox handles its own revisioning.
    location = /sw.js               { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /workbox-*.js        { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /firebase-messaging-sw.js { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; try_files $uri =404; }

    # ── Legacy CRA bundle (30-day soak) ────────────────────────────────────
    location /legacy/ {
        alias /var/www/rms/legacy/build/;
        try_files $uri $uri/ /legacy/index.html;
    }

    # ?ui=legacy escape hatch — turn this on during soak so support can route
    # individual customers to legacy without flipping the whole site.
    # if ($arg_ui = "legacy") { rewrite ^/$ /legacy/ last; }

    # SPA fallback — every other route serves the v2 SPA shell, React Router
    # picks it up client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
