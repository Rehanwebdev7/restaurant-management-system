# ---- SMS gateway (customer OTP) ----
# Drop in `sms.provider=msg91` + the 4 MSG91 values below to flip customer
# OTP from demo mode (frontend uses 1234) to real SMS. Until then the
# NoopSmsService logs the OTP to stdout so you can still test the flow.
#
#   sms.provider=msg91
#   sms.msg91.auth-key=<from MSG91 dashboard → Settings → Auth Keys>
#   sms.msg91.sender-id=<6-char DLT-approved sender id>
#   sms.msg91.template-id=<DLT-approved OTP template id, contains {{otp}}>
#   sms.msg91.country-code=91
