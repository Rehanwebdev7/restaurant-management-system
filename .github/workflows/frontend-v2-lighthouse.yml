name: frontend-v2 Lighthouse

on:
  pull_request:
    paths:
      - 'frontend-v2/**'
      - '.github/workflows/frontend-v2-lighthouse.yml'

concurrency:
  group: frontend-v2-lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI (perf/a11y/best-practices)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start preview server
        run: npm run preview -- --host 127.0.0.1 --port 4173 &
        env:
          CI: 'true'

      - name: Wait for preview
        run: npx --yes wait-on http://127.0.0.1:4173 --timeout 60000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://127.0.0.1:4173/
          configPath: ./frontend-v2/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
