name: frontend-v2 CI

on:
  pull_request:
    paths:
      - 'frontend-v2/**'
      - '.github/workflows/frontend-v2-ci.yml'
  push:
    branches: [main]
    paths:
      - 'frontend-v2/**'
      - '.github/workflows/frontend-v2-ci.yml'

concurrency:
  group: frontend-v2-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Use `tsc -b` (build-mode project references) — `tsc --noEmit` resolves
      # against the empty root tsconfig.json and silently typechecks nothing,
      # so it would let real errors slip past. `tsc -b` walks both
      # tsconfig.app.json and tsconfig.node.json and surfaces every type
      # error the build itself would hit.
      - name: Typecheck
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify modulepreload critical path stays trim
        # Fails the build if Vite re-emits a modulepreload for one of the
        # chunks we explicitly strip (`optional-features`, `sentry`,
        # `payments`, `charts`). Catches regressions in `vite.config.ts`
        # before they hit production and re-bloat the customer landing.
        run: |
          set -eu
          unwanted="$(grep -oE 'modulepreload[^>]*assets/(optional-features|sentry|payments|charts)-[^"]+"' dist/index.html || true)"
          if [ -n "$unwanted" ]; then
            echo "::error::dist/index.html still preloads chunks that should be lazy:"
            echo "$unwanted"
            exit 1
          fi
          echo "✓ critical-path preloads OK"

  e2e:
    name: playwright e2e + axe
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start preview server
        run: npm run preview -- --port 5174 --strictPort &
        env:
          CI: 'true'

      - name: Wait for server
        run: npx wait-on http://localhost:5174 -t 60000

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend-v2/playwright-report
          retention-days: 7
